{{- if not .Values.secrets.existingSecret }}
{{- $_ := required "secrets.jwtSecret is required (min 32 chars)" .Values.secrets.jwtSecret }}
{{- $_ := required "secrets.adminPassword is required" .Values.secrets.adminPassword }}
{{- $_ := required "secrets.userPassword is required" .Values.secrets.userPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "libredb-studio.fullname" . }}
  labels:
    {{- include "libredb-studio.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secrets.existingSecretKeys.jwtSecret }}: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{ .Values.secrets.existingSecretKeys.adminEmail }}: {{ .Values.secrets.adminEmail | b64enc | quote }}
  {{ .Values.secrets.existingSecretKeys.adminPassword }}: {{ .Values.secrets.adminPassword | b64enc | quote }}
  {{ .Values.secrets.existingSecretKeys.userEmail }}: {{ .Values.secrets.userEmail | b64enc | quote }}
  {{ .Values.secrets.existingSecretKeys.userPassword }}: {{ .Values.secrets.userPassword | b64enc | quote }}
  {{- if .Values.secrets.llmApiKey }}
  {{ .Values.secrets.existingSecretKeys.llmApiKey }}: {{ .Values.secrets.llmApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientId }}
  {{ .Values.secrets.existingSecretKeys.oidcClientId }}: {{ .Values.secrets.oidcClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  {{ .Values.secrets.existingSecretKeys.oidcClientSecret }}: {{ .Values.secrets.oidcClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.storagePostgresUrl }}
  {{ .Values.secrets.existingSecretKeys.storagePostgresUrl }}: {{ .Values.secrets.storagePostgresUrl | b64enc | quote }}
  {{- end }}
{{- end }}
