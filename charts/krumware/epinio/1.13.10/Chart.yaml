annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "false"
  catalog.cattle.io/certified: partner
  catalog.cattle.io/display-name: Epinio
  catalog.cattle.io/kube-version: '>=1.21-0'
  catalog.cattle.io/release-name: epinio
apiVersion: v2
appVersion: v1.13.10
dependencies:
- condition: global.dex.enabled
  name: dex
  repository: https://charts.dexidp.io
  tags:
  - dex
  version: 0.15.2
- condition: seaweedfs.enabled, global.seaweedfs.enabled
  name: seaweedfs
  repository: https://seaweedfs.github.io/seaweedfs/helm
  tags:
  - seaweedfs
  version: 4.0.412
- condition: reflector.enabled, global.reflector.enabled
  name: reflector
  repository: oci://ghcr.io/emberstack/helm-charts
  tags:
  - reflector
  version: 10.0.21
- condition: s3gw.enabled, global.s3gw.enabled
  name: s3gw
  repository: https://s3gw-tech.github.io/s3gw-charts
  tags:
  - s3gw
  version: 0.14.0
description: Epinio deploys Kubernetes applications directly from source code in one
  step.
home: https://github.com/epinio/epinio
icon: file://assets/icons/epinio.png
