{{- if and .Values.seaweedfs.enabled .Values.seaweedfs.tls.enabled .Values.seaweedfs.global.enableSecurity }}
{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: seaweedfs-cert
  namespace: {{ .Release.Namespace }}
spec:
  dnsNames:
  - {{ include "epinio.seaweedfs-hostname" . }}
  issuerRef:
    kind: ClusterIssuer
    # We always trust the CA for SeaweedFS so we can always use selfsigned certs
    # Because Letsencrypt doesn't create certs for non public domains
    name: epinio-ca
  secretName: {{ default "seaweedfs-tls" .Values.seaweedfs.tls.certSecret }}
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: ""  # Empty = all namespaces
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: ""  # Auto-create mirrors in all namespaces
{{ else }}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  annotations:
  name: {{ default "seaweedfs-tls" .Values.seaweedfs.tls.certSecret }}
  namespace: {{ .Release.Namespace }}
stringData:
  ca.crt: {{ .Values.certManager.s3.ca | quote }}
  tls.key: {{ .Values.certManager.s3.key | quote }}
  tls.crt: {{ .Values.certManager.s3.cert | quote }}
{{- end }}
{{- end }}