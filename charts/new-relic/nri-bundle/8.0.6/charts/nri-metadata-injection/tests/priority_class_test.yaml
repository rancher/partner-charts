suite: priorityClassName
templates:
  - templates/deployment.yaml
release:
  name: my-release
  namespace: my-namespace
tests:
  - it: does not set a priorityClassName by default
    set:
      cluster: test-cluster
    asserts:
      - notExists:
          path: spec.template.spec.priorityClassName
  - it: inherits global.priorityClassName when local priorityClassName not set
    set:
      cluster: test-cluster
      global.priorityClassName: global-priority-class
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: global-priority-class

  - it: uses local priorityClassName over global.priorityClassName
    set:
      cluster: test-cluster
      priorityClassName: local-priority-class
      global.priorityClassName: global-priority-class
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: local-priority-class
