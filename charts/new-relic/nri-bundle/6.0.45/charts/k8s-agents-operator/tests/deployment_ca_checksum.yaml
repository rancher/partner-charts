suite: Test checksum annotation
templates:
  - deployment.yaml
tests:
  - it: should set checksum/serving-ca annotation
    set:
      k8s-agents-operator.webhookCert.caCert: "test-ca-cert"
    asserts:
      - equal:
          path: spec.template.metadata.annotations.checksum/serving-ca
          value: "{{ \"test-ca-cert\" | sha256sum }}"
  - it: should update checksum/serving-ca annotation when caCert changes
    set:
      k8s-agents-operator.webhookCert.caCert: "another-ca-cert"
    asserts:
      - notEqual:
          path: spec.template.metadata.annotations.checksum/serving-ca
          value: "{{ \"test-ca-cert\" | sha256sum }}"
