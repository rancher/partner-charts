suite: test cluster environment variable setup
templates:
  - templates/deployment.yaml
release:
  name: release
  namespace: ns
tests:
  - it: clusterName env is properly set
    set:
      cluster: my-cluster
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: clusterName
            value: my-cluster
  - it: fail when cluster is not defined
    asserts:
      - failedTemplate:
          errorMessage: There is not cluster name definition set neither in `.global.cluster' nor `.cluster' in your values.yaml. Cluster name is required.
  - it: should inherit global.cluster when local cluster not set
    set:
      global.cluster: global-test-cluster
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="clusterName")].value
          value: global-test-cluster

  - it: should use local cluster over global.cluster
    set:
      cluster: local-cluster
      global.cluster: global-cluster
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="clusterName")].value
          value: local-cluster
