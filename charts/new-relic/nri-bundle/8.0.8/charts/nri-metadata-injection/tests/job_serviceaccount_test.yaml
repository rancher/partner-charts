suite: job serviceAccount
templates:
  - templates/admission-webhooks/job-patch/job-createSecret.yaml
  - templates/admission-webhooks/job-patch/job-patchWebhook.yaml
release:
  name: my-release
  namespace: my-namespace
tests:
  - it: creates and uses a ServiceAccount by default
    set:
      cluster: test-cluster
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-release-nri-metadata-injection-admission

  - it: uses a custom ServiceAccount name when serviceAccount.create is false
    set:
      cluster: test-cluster
      serviceAccount.create: false
      serviceAccount.name: sa-test
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: sa-test

  - it: uses default ServiceAccount name when serviceAccount.create is false but no name provided
    set:
      cluster: test-cluster
      serviceAccount.create: false
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default

  - it: has a linux node selector by default
    set:
      cluster: my-cluster
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/os: linux

  - it: has a linux node selector and additional selectors
    set:
      cluster: my-cluster
      nodeSelector:
        aCoolTestLabel: aCoolTestValue
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/os: linux
            aCoolTestLabel: aCoolTestValue

  - it: inherits global tolerations when local tolerations not set
    set:
      cluster: my-cluster
      global.tolerations:
        - key: globalTaintKey
          operator: Exists
          effect: NoExecute
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: globalTaintKey
              operator: Exists
              effect: NoExecute

  - it: uses local tolerations over global tolerations
    set:
      cluster: my-cluster
      global.tolerations:
        - key: globalTaintKey
          operator: Exists
          effect: NoExecute
      tolerations:
        - key: localTaintKey
          operator: Exists
          effect: NoExecute
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: localTaintKey
              operator: Exists
              effect: NoExecute
