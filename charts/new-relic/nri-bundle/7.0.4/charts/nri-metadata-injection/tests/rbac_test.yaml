suite: test RBAC creation
templates:
  - templates/admission-webhooks/job-patch/rolebinding.yaml
  - templates/admission-webhooks/job-patch/clusterrolebinding.yaml
release:
  name: my-release
  namespace: my-namespace
tests:
  - it: uses default ServiceAccount
    set:
      cluster: test-cluster
      serviceAccount.create: true
    asserts:
      - equal:
          path: subjects[0].name
          value: my-release-nri-metadata-injection-admission

  - it: uses a custom ServiceAccount when serviceAccount.create is false and name provided
    set:
      cluster: test-cluster
      serviceAccount.create: false
      serviceAccount.name: sa-test
    asserts:
      - equal:
          path: subjects[0].name
          value: sa-test

  - it: uses default ServiceAccount name when serviceAccount.create is false but no name provided
    set:
      cluster: test-cluster
      serviceAccount.create: false
    asserts:
      - equal:
          path: subjects[0].name
          value: default
