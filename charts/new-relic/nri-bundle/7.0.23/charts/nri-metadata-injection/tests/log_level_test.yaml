suite: test log level configuration
templates:
  - templates/deployment.yaml
release:
  name: my-release
  namespace: my-namespace
tests:
  - it: should use default log level (info) when not specified
    set:
      cluster: test-cluster
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_K8S_METADATA_INJECTION_LOG_LEVEL
            value: "info"

  - it: should set log level to debug
    set:
      cluster: test-cluster
      logLevel: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_K8S_METADATA_INJECTION_LOG_LEVEL
            value: "debug"

  - it: should set log level to warn
    set:
      cluster: test-cluster
      logLevel: warn
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_K8S_METADATA_INJECTION_LOG_LEVEL
            value: "warn"

  - it: should set log level to error
    set:
      cluster: test-cluster
      logLevel: error
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_K8S_METADATA_INJECTION_LOG_LEVEL
            value: "error"

  - it: should set log level to fatal
    set:
      cluster: test-cluster
      logLevel: fatal
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_K8S_METADATA_INJECTION_LOG_LEVEL
            value: "fatal"

  - it: should set log level to panic
    set:
      cluster: test-cluster
      logLevel: panic
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_K8S_METADATA_INJECTION_LOG_LEVEL
            value: "panic"

  - it: should set log level to dpanic
    set:
      cluster: test-cluster
      logLevel: dpanic
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_K8S_METADATA_INJECTION_LOG_LEVEL
            value: "dpanic"

