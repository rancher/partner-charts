{{- if .Values.middleware.create -}}
{{- if .Values.middleware.monitoring.create -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    {{- include "harikube.labels" . | nindent 4 }}
  name: harikube-middleware-sm
  namespace: {{ .Release.Namespace }}
spec:
  endpoints:
  - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    path: /metrics
    port: metrics
    scheme: https
    tlsConfig:
      ca:
        secret:
          key: ca.crt
          name: harikube-middleware-metrics-crt
      cert:
        secret:
          key: tls.crt
          name: harikube-middleware-metrics-crt
      insecureSkipVerify: false
      keySecret:
        key: tls.key
        name: harikube-middleware-metrics-crt
      serverName: harikube-middleware-metrics-svc.{{ .Release.Namespace }}.svc
  selector:
    matchLabels:
    {{- with .Values.middleware.podLabels }}
    {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
