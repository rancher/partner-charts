{{- if .Values.middleware.create -}}
{{- if .Values.middleware.networkPolicy.create -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    {{- include "harikube.labels" . | nindent 4 }}
  name: harikube-middleware-netpol
  namespace: {{ .Release.Namespace }}
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          harikube.info/{{ .Release.Namespace }}-middleware: enabled
    ports:
    - port: {{ .Values.middleware.service.apiPort.port }}
      protocol: TCP
  podSelector:
    matchLabels:
    {{- with .Values.middleware.podLabels }}
    {{- toYaml . | nindent 6 }}
    {{- end }}
  policyTypes:
  - Ingress
{{ if .Values.middleware.monitoring.create }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    {{- include "harikube.labels" . | nindent 4 }}
  name: harikube-middleware-metrics-netpol
  namespace: {{ .Release.Namespace }}
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          metrics: enabled
    ports:
    - port: {{ .Values.middleware.service.metrics.port }}
      protocol: TCP
  podSelector:
    matchLabels:
    {{- with .Values.middleware.podLabels }}
    {{- toYaml . | nindent 6 }}
    {{- end }}
  policyTypes:
  - Ingress
{{ end }}
{{- end }}
{{- end }}
