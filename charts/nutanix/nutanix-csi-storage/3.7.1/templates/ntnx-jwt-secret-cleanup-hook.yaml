{{- if and (eq .Values.ntnxInitConfigMap.usePC true) (eq .Values.ntnxInitConfigMap.usePEFallback true) }}
---
# Pre-delete hook to clean up the JWT secret created by authagent at runtime.
# The secret is intentionally not managed by Helm (to prevent Helm reconciliation
# from wiping authagent-written tokens), so it must be cleaned up explicitly on uninstall.
# Uses pre-delete (not post-delete) so the nutanix-csi-controller ServiceAccount
# still exists when this hook runs.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nutanix-csi-storage.fullname" . }}-jwt-secret-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nutanix-csi-storage.labels" . | nindent 4 }}
    app.kubernetes.io/component: jwt-secret-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  template:
    metadata:
      name: {{ include "nutanix-csi-storage.fullname" . }}-jwt-secret-cleanup
      labels:
        {{- include "nutanix-csi-storage.labels" . | nindent 8 }}
        app.kubernetes.io/component: jwt-secret-cleanup
    spec:
      restartPolicy: OnFailure
      serviceAccountName: nutanix-csi-controller
      containers:
        - name: jwt-secret-cleanup
          image: "alpine/k8s:1.27.3"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              SECRET_NAME="{{ include "nutanix-csi-storage.csiTokenFile" . }}"
              NAMESPACE="{{ .Release.Namespace }}"
              echo "Cleaning up JWT secret: $SECRET_NAME in namespace: $NAMESPACE"
              kubectl delete secret "$SECRET_NAME" -n "$NAMESPACE" --ignore-not-found=true
              echo "JWT secret cleanup complete."
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
  backoffLimit: 3
  activeDeadlineSeconds: 120
{{- end }}
