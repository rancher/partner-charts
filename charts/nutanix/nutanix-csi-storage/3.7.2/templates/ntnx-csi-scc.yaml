{{- if eq (toString .Values.openshift.scc) "true" }}
kind: SecurityContextConstraints
apiVersion: security.openshift.io/v1
metadata:
  name: ntnx-csi-scc
  labels:
    {{- include "nutanix-csi-storage.labels" . | nindent 4 }}
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: false
allowHostPorts: true
allowPrivilegeEscalation: true
allowPrivilegedContainer: true
allowedCapabilities: []
defaultAddCapabilities: []
fsGroup: 
  type: RunAsAny
groups: []
priority:
readOnlyRootFilesystem: false
requiredDropCapabilities: []
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:{{ .Release.Namespace }}:nutanix-csi-controller
  - system:serviceaccount:{{ .Release.Namespace }}:nutanix-csi-node
  {{- if .Values.volumeRWXSupport.enabled }}
  - system:serviceaccount:{{ .Release.Namespace }}:{{ include "nutanix-csi-storage.fullname" . }}-cn-rwx-installer-sa
  - system:serviceaccount:{{ .Release.Namespace }}:nutanix-cn-rwx-operator-manager
  {{- end }}
{{- end}}