{{- if .Values.tests.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "airlock-microgateway.fullname" . }}-test-install"
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: test-install
    app.kubernetes.io/name: {{ include "airlock-microgateway.name" . }}-tests
    sidecar.istio.io/inject: "false"
    {{- include "airlock-microgateway.sharedLabels" . | nindent 4 }}
    {{- include "airlock-microgateway.sharedSelectorLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: {{ include "airlock-microgateway.image" .Values.image }}
    args:
      - "helm-test"
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
    env:
      - name: HELM_RELEASE_NAME
        value: "{{ .Release.Name }}"
      - name: HELM_FULL_NAME
        value: "{{ include "airlock-microgateway.fullname" . }}"
      - name: RELEASE_NAMESPACE
        value: "{{ .Release.Namespace }}"

      - name: OPERATOR_DEPLOYMENT_NAME
        value: "{{ include "airlock-microgateway.fullname" . }}-operator"
      - name: CONTROLLER_NAME
        value: "{{ .Values.controllerName }}"
      - name: GATEWAY_NAME
        value: "{{ include "airlock-microgateway.fullname" . }}-test-gw"
      - name: TEST_GATEWAY_CLASS_NAME
        value: "{{ include "airlock-microgateway.fullname" . }}-test-gwc"
    securityContext:
      {{- include "airlock-microgateway.restrictedSecurityContext" . | nindent 6 }}
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- include "airlock-microgateway.imagePullSecrets" . | nindent 4 }}
  {{- end }}
  serviceAccountName: "{{ include "airlock-microgateway.fullname" . }}-tests"
{{- end -}}
