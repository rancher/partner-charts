{{- if (semverCompare ">=1.30 || >=1.30.1-0" .Capabilities.KubeVersion.Version) -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "airlock-microgateway.fullname" . }}-immutable-labels-{{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
  annotations:
  {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  policyName: {{ include "airlock-microgateway.fullname" . }}-immutable-labels-{{ .Release.Namespace }}
  validationActions: [Deny]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "airlock-microgateway.fullname" . }}-envoycluster-name-{{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
  annotations:
  {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  policyName: {{ include "airlock-microgateway.fullname" . }}-envoycluster-name-{{ .Release.Namespace }}
  validationActions: [Deny]
{{- end -}}