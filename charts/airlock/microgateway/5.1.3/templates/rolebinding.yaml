{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "airlock-microgateway.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "airlock-microgateway.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "airlock-microgateway.serviceAccountName" . }}
{{- end -}}
