{{- if .Values.serviceMonitor.create }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "airlock-microgateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "airlock-microgateway.selectorLabels" . | nindent 6 }}
    matchExpressions:
      - { key: "operator.microgateway.airlock.com/isLeader", operator: DoesNotExist }
  endpoints:
    - path: /metrics
      port: metrics
      scheme: http
      metricRelabelings:
        - sourceLabels:
            - __name__
          regex: {{ include "airlock-microgateway.metricsLeaderOnlyRegexPattern" . }}
          action: drop
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "airlock-microgateway.fullname" . }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "airlock-microgateway.selectorLabels" . | nindent 6 }}
      operator.microgateway.airlock.com/isLeader: "true"
  endpoints:
    - path: /metrics
      port: metrics
      scheme: http
      metricRelabelings:
        - sourceLabels:
            - __name__
          regex: {{ include "airlock-microgateway.metricsLeaderOnlyRegexPattern" . }}
          action: keep
{{- end -}}