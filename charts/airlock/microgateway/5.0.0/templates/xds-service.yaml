apiVersion: v1
kind: Service
metadata:
  name: airlock-microgateway-operator-xds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
    {{- with .Values.serviceLabels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with mustMerge .Values.serviceAnnotations .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
  - appProtocol: grpc
    name: xds
    port: 13377
    protocol: TCP
    targetPort: 13377
  selector:
    {{- include "airlock-microgateway.selectorLabels" . | nindent 4 }}
    operator.microgateway.airlock.com/isLeader: "true"
