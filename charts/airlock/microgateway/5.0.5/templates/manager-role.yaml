{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "airlock-microgateway.fullname" . }}-manager-{{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
{{ include "airlock-microgateway-operator.rbacRules" . -}}
{{- end -}}
