{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "airlock-microgateway.fullname" . }}-manager-{{ .Release.Namespace }}
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "airlock-microgateway.fullname" . }}-manager-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "airlock-microgateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
