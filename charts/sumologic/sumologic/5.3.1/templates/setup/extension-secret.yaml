{{/*
When sourceless mode is enabled and an installation token is supplied via values,
this template writes it to the sumologic-extension secret so pods can reference it via secretKeyRef.

When installationToken is empty and setupEnabled=true, the setup job (Terraform) auto-creates and manages
the installation token/secret instead.
*/}}
{{- if and .Values.sumologic.sourcelessMode .Values.sumologic.installationToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sumologic.extension.secret.name" . }}
  namespace: {{ template "sumologic.namespace" . }}
  labels:
    {{- include "sumologic.labels.common" . | nindent 4 }}
type: Opaque
data:
  SUMOLOGIC_INSTALLATION_TOKEN: {{ .Values.sumologic.installationToken | b64enc }}
{{- end }}
