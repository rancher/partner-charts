{{- if .Values.web.ingress.enabled -}}

{{- if and .Values.web.ingress.className (not (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion)) }}
  {{- if not (hasKey .Values.web.ingress.annotations "kubernetes.io/ingress.class") }}
  {{- $_ := set .Values.web.ingress.annotations "kubernetes.io/ingress.class" .Values.web.ingress.className}}
  {{- end }}
{{- end }}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: devguard-web-ingress
  labels:
    {{- include "devguard.labels" . | nindent 4 }}
  {{- with .Values.web.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if and .Values.web.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  {{- if kindIs "slice" .Values.web.ingress.tls }}
  {{- /* Legacy shape: tls is a list of {hosts, secretName} entries. Kept for
         backwards compatibility with values files written before the
         single-host migration. New installs should set tls=true. */}}
  tls:
    {{- range .Values.web.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- else if .Values.web.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.web.ingress.host | quote }}
      secretName: {{ .Values.web.ingress.tlsSecretName | default "devguard-web-tls" }}
  {{- end }}
  rules:
    {{- if .Values.web.ingress.hosts }}
    {{- /* Legacy shape: hosts is a list of {host, paths[]} entries. Kept for
           backwards compatibility with values files written before the
           single-host migration. New installs should use web.ingress.host. */}}
    {{- range .Values.web.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if and .pathType (semverCompare ">=1.18-0" $.Capabilities.KubeVersion.GitVersion) }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: devguard-web-service
                port:
                  number: 3000
              {{- else }}
              serviceName: devguard-web-service
              servicePort: 3000
              {{- end }}
          {{- end }}
    {{- end }}
    {{- else }}
    - host: {{ .Values.web.ingress.host | quote }}
      http:
        paths:
          - path: /
            {{- if semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion }}
            pathType: Prefix
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion }}
              service:
                name: devguard-web-service
                port:
                  number: 3000
              {{- else }}
              serviceName: devguard-web-service
              servicePort: 3000
              {{- end }}
    {{- end }}
{{- end }}
