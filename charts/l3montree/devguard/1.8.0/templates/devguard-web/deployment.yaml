{{- $protocol := "http" -}}
{{- if .Values.web.ingress.tls -}}
{{- $protocol = "https" -}}
{{- end -}}
{{- $host := .Values.web.ingress.host -}}
{{- $webImage := include "devguard.image" (dict "image" .Values.web.image "defaultTag" .Chart.AppVersion) -}}
{{- $webImagePullPolicy := include "devguard.imagePullPolicy" (dict "image" .Values.web.image) -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: devguard-web-deployment
  labels:
    {{- include "devguard.labels" . | nindent 4 }}
    app: devguard-web
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicaCount | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app: devguard-web
  template:
    metadata:
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "devguard.labels" . | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        app: devguard-web
        version: {{ .Chart.AppVersion }}
    spec:
      {{- with .Values.web.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 53111
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 53111
            runAsNonRoot: true
            capabilities:
                drop:
                - ALL
          image: {{ $webImage | quote }}
          imagePullPolicy: {{ $webImagePullPolicy }}
          env:
          # Kubernetes injects HOSTNAME=<pod-name>, which the Next.js standalone
          # server uses as its bind address — causing it to listen only on the
          # pod IP (resolved via /etc/hosts) and not on loopback. Force 0.0.0.0
          # so it binds all interfaces (needed for kubectl port-forward, etc.).
          - name: HOSTNAME
            value: "0.0.0.0"
          - name: DEVGUARD_API_URL
            value: {{ .Values.web.devguardApiUrl | default "http://devguard-api-service:8080" | quote }}
          - name: REGISTRATION_ENABLED
            value: {{ .Values.web.registrationEnabled | quote }}
          - name: DEVGUARD_API_URL_PUBLIC_INTERNET
            value: {{ .Values.web.devguardApiUrlPublicInternet }}
          - name: ORY_SDK_URL
            value: http://kratos:4433
          - name: ORY_SDK_PUBLIC_URL
            value: {{ printf "%s://%s" $protocol $host }}
          - name: FRONTEND_URL
            value: {{ printf "%s://%s" $protocol $host }}
          - name: PRIVACY_POLICY_LINK
            value: {{ .Values.web.privacyPolicyLink | quote }}
          - name: TERMS_OF_USE_LINK
            value: {{ .Values.web.termsOfUseLink | quote }}
          - name: IMPRINT_LINK
            value: {{ .Values.web.imprintLink | quote }}
          - name: THEME_JS_URL
            value: {{ .Values.web.themeJsUrl | quote }}
          - name: THEME_JS_INTEGRITY
            value: {{ .Values.web.themeJsIntegrity | quote }}
          - name: THEME_CSS_URL
            value: {{ .Values.web.themeCssUrl | quote }}
          - name: ANALYTICS_SCRIPT_URL
            value: {{ .Values.web.analyticsScriptUrl | quote }}
          - name: ANALYTICS_WEBSITE_ID
            value: {{ .Values.web.analyticsWebsiteId | quote }}
          - name: ANALYTICS_SCRIPT_INTEGRITY
            value: {{ .Values.web.analyticsScriptIntegrity | quote }}
          - name: DEVGUARD_CI_COMPONENT_BASE
            value: {{ .Values.web.ciComponentBase | quote }}
          - name: ACCOUNT_DELETION_MAIL
            value: {{ .Values.web.accountDeletionMail | quote }}
          - name: ENFORCE_THEME
            value: {{ .Values.web.enforceTheme | default "" }}
          {{- if .Values.web.errorTracking.dsn }}
          - name: ERROR_TRACKING_DSN
            value: {{ .Values.web.errorTracking.dsn | quote }}
          {{- end }}
          {{- range $key, $val := .Values.web.additionalEnvs }}
          - name: {{ $key }}
            value: {{ tpl $val $ | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
          - mountPath: /tmp
            name: tmp-dir
          - mountPath: /app/.next/cache
            name: next-cache
      volumes:
      - name: tmp-dir
        emptyDir:
          sizeLimit: 100Mi
      - name: next-cache
        emptyDir:
          sizeLimit: 500Mi
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
