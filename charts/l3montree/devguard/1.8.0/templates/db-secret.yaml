# generate the secret if it does not exist
---
apiVersion: v1
kind: Secret
metadata:
    name: db-secret
type: Opaque
data:
# retrieve the secret data using lookup function and when not exists, return an empty dictionary / map as result
    {{- $secretObj := (lookup "v1" "Secret" .Release.Namespace "db-secret") | default dict }}
    {{- $secretData := (get $secretObj "data") | default dict }}
    {{- $password := (get $secretData "password") | default (randAlphaNum 32 | b64enc) }}
    {{- $postgresPassword := (get $secretData "postgres-password") | default (randAlphaNum 32 | b64enc) }}

    postgres-password: {{ $postgresPassword | quote }}
    password: {{ $password | quote }}
    replication-password: {{(get $secretData "replication-password") | default (randAlphaNum 32 | b64enc) | quote}}
    {{- if .Values.observability.serviceMonitor.enabled }}
    postgres-exporter-dsn: {{ printf "postgresql://devguard:%s@localhost:5432/devguard?sslmode=disable" ($postgresPassword | b64dec) | b64enc | quote }}
    {{- end }}