{{- $postgresqlImage := include "devguard.image" (dict "image" .Values.postgresql.image "defaultTag" .Chart.AppVersion) -}}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: postgresql
  name: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  serviceName: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        version: "{{ .Chart.AppVersion }}"
      {{- with .Values.postgresql.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.postgresql.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.volumePermissions.enabled }}
      initContainers:
      - name: init-chown-data
        image: "{{ .Values.postgresql.volumePermissions.image.repository }}:{{ .Values.postgresql.volumePermissions.image.tag }}"
        imagePullPolicy: {{ .Values.postgresql.volumePermissions.image.pullPolicy }}
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
        command:
        - sh
        - -c
        - chown -R 999:999 /var/lib/postgresql/data
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgresql-pv
          subPath: postgresql
        resources:
          {{- toYaml .Values.postgresql.volumePermissions.resources | nindent 10 }}
      {{- end }}
      containers:
      - image: {{ $postgresqlImage | quote }}
        name: postgresql
        args: ["-c", "config_file=/etc/postgresql/postgresql.conf"]
        {{- with .Values.postgresql.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: 5432
          protocol: TCP
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgresql-pv
          subPath: postgresql
        - mountPath: /docker-entrypoint-initdb.d/initdb.sh
          name: postgresql-initdb
          subPath: initdb.sh
        - mountPath: /etc/postgresql/postgresql.conf
          name: postgresql-config
          subPath: postgresql.conf
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /run/postgresql
          name: postgresql-run
        env:
        - name: POSTGRES_DB
          value: devguard
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: postgres-password
              name: db-secret
        - name: POSTGRES_USER
          value: devguard
        - name: KRATOS_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: kratos-db-secret
        resources:
          {{- toYaml .Values.postgresql.resources | nindent 10 }}
      {{- if .Values.observability.serviceMonitor.enabled }}
      - name: postgres-exporter
        image: "{{ .Values.observability.postgresql.exporter.image.repository }}:{{ .Values.observability.postgresql.exporter.image.tag }}"
        imagePullPolicy: {{ .Values.observability.postgresql.exporter.image.pullPolicy }}
        {{- with .Values.observability.postgresql.exporter.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 9187
          protocol: TCP
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: postgres-exporter-dsn
        resources:
          {{- toYaml .Values.observability.postgresql.exporter.resources | nindent 10 }}
      {{- end }}
      restartPolicy: Always
      volumes:
      - name: postgresql-pv
        persistentVolumeClaim:
          claimName: postgresql-pvc
      - name: postgresql-initdb
        configMap:
          name: postgresql-initdb
      - name: postgresql-config
        configMap:
          name: postgresql-config
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.postgresql.shm.sizeLimit }}
      - name: postgresql-run
        emptyDir: {}
