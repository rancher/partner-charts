{{- if .Values.api.ingress.enabled -}}
{{- if and .Values.api.ingress.className (not (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion)) }}
  {{- if not (hasKey .Values.api.ingress.annotations "kubernetes.io/ingress.class") }}
  {{- $_ := set .Values.api.ingress.annotations "kubernetes.io/ingress.class" .Values.api.ingress.className}}
  {{- end }}
{{- end }}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: devguard-api-ingress
  labels:
    {{- include "devguard.labels" . | nindent 4 }}
  {{- with .Values.api.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if and .Values.api.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- end }}
  {{- if and .Values.api.ingress.tls (kindIs "slice" .Values.api.ingress.tls) }}
  {{- fail "api.ingress.tls is now a boolean: the certificate always covers the single api.ingress.host. Set api.ingress.tls=true and optionally api.ingress.tlsSecretName (defaults to devguard-api-tls). If you need multiple TLS entries, please open a ticket describing your use case: https://github.com/l3montree-dev/devguard-helm-chart/issues" }}
  {{- end }}
  {{- if .Values.api.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.api.ingress.host | quote }}
      secretName: {{ .Values.api.ingress.tlsSecretName | default "devguard-api-tls" }}
  {{- end }}
  rules:
    {{- if .Values.api.ingress.hosts }}
    {{- fail "api.ingress.hosts has been replaced by the single-host api.ingress.host value (served at path /). If you need multiple hosts or a path prefix, please open a ticket describing your use case: https://github.com/l3montree-dev/devguard-helm-chart/issues" }}
    {{- end }}
    - host: {{ .Values.api.ingress.host | quote }}
      http:
        paths:
          - path: /
            {{- if semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion }}
            pathType: Prefix
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion }}
              service:
                name: devguard-api-service
                port:
                  number: 8080
              {{- else }}
              serviceName: devguard-api-service
              servicePort: 8080
              {{- end }}
{{- end }}
