questions:
- variable: api.ingress.enabled
  default: true
  required: true
  type: boolean
  label: API Ingress Enabled
  group: "API (required for web and API access)"
  show_subquestion_if: true
  subquestions:
  - variable: api.ingress.hosts[0].host
    required: true
    type: hostname
    label: API Ingress Host
    description: The hostname for the API ingress. This should be a fully qualified domain name (FQDN) that resolves to the IP address of the ingress controller (e.g. api.devguard.example.com).
    group: "API (required for web and API access)"
  - variable: api.ingress.hosts[0].paths[0].path
    required: true
    default: "/"
    type: string
    label: API Ingress Path
    description: The path for the API ingress. This should be a valid URL path (e.g. / or /devguard/).
    group: "API (required for web and API access)"


- variable: web.ingress.enabled
  default: true
  required: true
  type: boolean
  label: Web Ingress Enabled
  group: "Web (required for web access)"
  show_subquestion_if: true
  subquestions:
  - variable: web.ingress.hosts[0].host
    required: true
    type: hostname
    label: Web Ingress Host
    description: The hostname for the web ingress. This should be a fully qualified domain name (FQDN) that resolves to the IP address of the ingress controller (e.g. web.devguard.example.com).
    group: "Web (required for web access)"
  - variable: web.ingress.hosts[0].paths[0].path
    required: true
    default: "/"
    type: string
    label: Web Ingress Path
    description: The path for the web ingress. This should be a valid URL path (e.g. / or /devguard/).
    group: "Web (required for web access)"


- variable: password
  default: true
  required: true
  type: boolean
  label: Password Authentication Enabled
  group: "Authentication"
- variable: passkey
  default: true
  required: true
  type: boolean
  label: Passkey Authentication Enabled
  group: "Authentication"


- variable: mail.existingSMTPConnectionUriSecret
  required: true
  type: string
  label: SMTP Connection URI Secret
  group: "Mail (required for account verification)"
- variable: mail.fromAddress
  required: true
  type: string
  label: SMTP From Address
  group: "Mail (required for account verification)"
- variable: mail.fromName
  required: true
  default: "DevGuard"
  type: string
  label: SMTP From Name
  group: "Mail (required for account verification)"


- variable: api.csaf.existingCsafSecretName
  required: false
  type: string
  default: "csaf-key-pair"
  label: CSAF Secret Name
  group: "CSAF (optional, for advisory generation)"
  description: For Common Security Advisory Framework (CSAF) support follow instructions here:https://docs.devguard.org/how-to-guides/administration/deploy-with-helm/#optional-csaf-support
- variable: api.csaf.aggregatorNamespace
  required: false
  type: string
  label: CSAF Aggregator Namespace
  description: The namespace (domain) of the CSAF aggregator (e.g. example.com).
  group: "CSAF (optional, for advisory generation)"
- variable: api.csaf.aggregatorName
  required: false
  type: string
  label: CSAF Aggregator Name
  description: The name of the CSAF aggregator organization (e.g. Example GmbH).
  group: "CSAF (optional, for advisory generation)"
- variable: api.csaf.aggregatorContactDetails
  required: false
  type: string
  label: CSAF Aggregator Contact Details
  description: The contact details for the CSAF aggregator (e.g. csaf@example.com).
  group: "CSAF (optional, for advisory generation)"
