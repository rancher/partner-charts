{{- if .Values.ebpf.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: speedscale-nettap
  namespace: {{ .Release.Namespace }}
  labels:
    app: speedscale-nettap
---
{{ if .Capabilities.APIVersions.Has "security.openshift.io/v1" }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: speedscale-nettap
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: true
allowHostPorts: true
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities:
- BPF
- PERFMON
- NET_ADMIN
- SYS_ADMIN
- SYS_PTRACE
- SYS_RESOURCE
- NET_RAW
readOnlyRootFilesystem: true
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
volumes:
  - "*"
---
{{ end }}
{{- if .Values.namespaceSelector }}
{{- $namespaceList := append $.Values.namespaceSelector .Release.Namespace }}
{{- range $namespaceList }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: speedscale-nettap
  namespace: {{ . }}
  labels:
    app: speedscale-nettap
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  - namespaces
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
{{ if .Capabilities.APIVersions.Has "security.openshift.io/v1" }}
- apiGroups:
  - security.openshift.io
  resourceNames:
  - speedscale-nettap   # ← custom SCC
  resources:
  - securitycontextconstraints
  verbs:
  - use
{{ end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: speedscale-nettap
  namespace: {{ . }}
  labels:
    app: speedscale-nettap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: speedscale-nettap
subjects:
- kind: ServiceAccount
  name: speedscale-nettap
  namespace: {{ . }}
{{- end }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: speedscale-nettap
  labels:
    app: speedscale-nettap
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  - namespaces
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
{{ if .Capabilities.APIVersions.Has "security.openshift.io/v1" }}
- apiGroups:
  - security.openshift.io
  resourceNames:
  - speedscale-nettap   # ← custom SCC
  resources:
  - securitycontextconstraints
  verbs:
  - use
{{ end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: speedscale-nettap
  labels:
    app: speedscale-nettap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: speedscale-nettap
subjects:
- kind: ServiceAccount
  name: speedscale-nettap
  namespace: {{ .Release.Namespace }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: speedscale-nettap
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
{{ .Values.ebpf.configuration | toYaml | indent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: speedscale-nettap
  namespace: {{ .Release.Namespace }}
  annotations:
    controlplane.speedscale.com/annotations: "true"
    {{- if .Values.globalAnnotations }}
{{ toYaml .Values.globalAnnotations | indent 4}}
    {{- end }}
  labels:
    app: speedscale-nettap
    {{- if .Values.globalLabels }}
{{ toYaml .Values.globalLabels | indent 4}}
    {{- end }}
spec:
  selector:
    matchLabels:
      app: speedscale-nettap
  template:
    metadata:
      labels:
        app: speedscale-nettap
        {{- if .Values.globalLabels }}
{{ toYaml .Values.globalLabels | indent 8}}
        {{- end }}
    spec:
      priorityClassName: system-node-critical
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              {{- if eq .Values.cloudProvider "aws" }}
              # GKE Autopilot's warden rejects node-affinity keys outside its
              # allowlist, so this EKS-specific exclusion is gated on cloudProvider.
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                - fargate
              {{- end }}
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
                - arm64
              - key: kubernetes.io/os
                operator: NotIn
                values:
                - windows
      serviceAccountName: speedscale-nettap
      restartPolicy: Always
      tolerations:
      - operator: Exists
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      # Capture container - nettap eBPF agent
      - name: speedscale-nettap-capture
        image: {{ .Values.image.registry }}/nettap:{{ .Values.imageTags.nettap | default "v0.0.49" }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: api
          containerPort: 42424
        - name: java-agent
          containerPort: 42425
        env:
        - name: NETTAP_API_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: NETTAP_SYSTEM_PROCFSPATH
          value: {{ .Values.ebpf.configuration.system.procfsPath }}
        - name: NETTAP_SYSTEM_CGROUPV2PATH
          value: {{ .Values.ebpf.configuration.system.cgroupv2Path }}
        - name: NETTAP_SYSTEM_VMLINUXPATH
          value: {{ .Values.ebpf.configuration.system.vmlinuxPath }}
        - name: NETTAP_SYSTEM_NODENAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NETTAP_CONFIG_MAP
          value: speedscale-nettap
        - name: NETTAP_CONFIG_MAP_TARGETS
          value: speedscale-nettap-targets
        # OTLP export of nettap's observability stream (node/pod snapshots,
        # connection events, metrics) into the forwarder. Empty endpoint
        # disables export in nettap, so the forwarder's Topology gRPC service
        # would have nothing to serve - default to the in-cluster forwarder
        # service so Topology / Nodes work out of the box. This is the
        # follow-up wire-up MR S-10828 missed: removing the old goproxy ->
        # forwarder observability relay assumed nettap would emit OTLP, but
        # the DaemonSet was never told where to send it.
        - name: NETTAP_TELEMETRY_ENDPOINT
          value: {{ .Values.ebpf.configuration.telemetry.endpoint | default (printf "speedscale-forwarder.%s.svc:4317" .Release.Namespace) }}
        - name: NETTAP_TELEMETRY_INSECURE
          value: "{{ .Values.ebpf.configuration.telemetry.insecure }}"
        resources: {{- toYaml .Values.ebpf.nettap.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.ebpf.nettap.capture.podSecurityContext | nindent 10 }}
        volumeMounts:
        - name: host-procfs
          mountPath: {{ .Values.ebpf.configuration.system.procfsPath }}
          readOnly: true
        - name: host-cgroup
          mountPath: {{ .Values.ebpf.configuration.system.cgroupv2Path }}
          readOnly: true
        - name: host-sys
          mountPath: /host/sys
          readOnly: true
        - name: host-sys
          mountPath: /sys/kernel/tracing
          subPath: kernel/tracing
          readOnly: true
        - name: host-netns
          mountPath: /var/run/netns
          readOnly: true
        - name: nettap-shared
          mountPath: /tmp
        - name: nettap-config
          mountPath: /etc/nettap
      - name: speedscale-nettap-ingest
        image: {{ .Values.image.registry }}/goproxy:{{ .Values.imageTags.goproxy | default .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: NETTAP_SOCKET_PATH
          value: /tmp/nettap.sock
        - name: NETTAP_LOG_SOCKET
          value: /tmp/nettap-logs.sock
        - name: LOG_LEVEL
          value: {{ .Values.ebpf.configuration.logging.level | default "info" }}
        - name: SPEC_NODENAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: SPEC_SERVICEACCOUNTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: FORWARDER_ADDR
          value: speedscale-forwarder.{{ .Release.Namespace }}.svc:80
        envFrom:
        - secretRef:
            name: '{{ ne .Values.apiKeySecret "" | ternary .Values.apiKeySecret "speedscale-apikey" }}'
            optional: false
        securityContext: {{- toYaml .Values.ebpf.nettap.ingest.podSecurityContext | nindent 10 }}
        resources: {{- toYaml .Values.ebpf.nettap.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            port: 4144
            path: /healthz
          initialDelaySeconds: 1
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            port: 4144
            path: /readyz
          initialDelaySeconds: 1
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nettap-shared
          mountPath: /tmp
      securityContext: {{ toYaml .Values.ebpf.nettap.securityContext | nindent 8 }}
      volumes:
      - name: host-procfs
        hostPath:
          path: /proc
      - name: host-cgroup
        hostPath:
          path: /sys/fs/cgroup
      - name: host-sys
        hostPath:
          path: /sys
      - name: host-netns
        hostPath:
          path: /var/run/netns
      - name: nettap-config
        configMap:
          name: speedscale-nettap
      - name: nettap-shared
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: speedscale-nettap
  namespace: {{ .Release.Namespace }}
  labels:
    app: speedscale-nettap
spec:
  type: ClusterIP
  internalTrafficPolicy: Local
  selector:
    app: speedscale-nettap
  ports:
  - port: 80
    targetPort: 42424
    name: api
  - port: 8000
    targetPort: 42425
    name: java-agent
---
# GKE's admission controller rejects pods using the system-node-critical priority class in any namespace but
# kube-system unless a matching ResourceQuota exists. Created unconditionally - it's harmless on other
# providers and decouples nettap scheduling from the cloudProvider hint being set correctly.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: speedscale-nettap-critical-pods
  namespace: {{ .Release.Namespace }}
spec:
  hard:
    pods: 1000
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values:
      - system-node-critical
---
{{- end }}