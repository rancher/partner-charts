# Number of replicas of KubeMQ Nodes - https://docs.kubemq.io/configuration/cluster/default-template
replicas: 3

# KubeMQ license key
key: kubemq license key

# KubeMQ license data - https://docs.kubemq.io/configuration/cluster/set-license
license: kubemq license data

# Private Registry Configuration
# Reference existing docker registry secrets for pulling images from private registries
# Create secrets first using:
#   kubectl create secret docker-registry my-registry-secret \
#     --docker-server=my-private-registry.com \
#     --docker-username=myuser \
#     --docker-password=mypassword \
#     --docker-email=myemail@example.com \
#     --namespace=kubemq
imagePullSecrets: []
# Example:
#   imagePullSecrets:
#     - name: my-registry-secret
#     - name: another-registry-secret  # Multiple secrets supported

# KubeMQ Volume Configuration - https://docs.kubemq.io/configuration/cluster/set-persistence-volume
volume:
  size: 10Gi
  storageClass: default

# KubeMQ docker image - https://docs.kubemq.io/configuration/cluster/set-cluster-image
image:
  image: kubemq/kubemq:latest
  pullPolicy: Always


# KubeMQ Api interface - https://docs.kubemq.io/configuration/cluster/set-api-interface
api:
  disabled: false
  expose: NodePort
  nodePort: 32080
  port: 8080
  # allowOrigins:
  #   - "https://app.example.com"

# KubeMQ gRPC interface - https://docs.kubemq.io/configuration/cluster/set-grpc-interface
grpc:
  disabled: false
  expose: NodePort
  nodePort: 32000
  port: 50000
  bodyLimit: 10000000
  # enableReflection: false
# KubeMQ REST interface - https://docs.kubemq.io/configuration/cluster/set-rest-interface
rest:
  bodyLimit: 1000000
  disabled: false
  expose: NodePort
  nodePort: 32090
  port: 9090
  # readTimeout: 30
  # writeTimeout: 30
  # cors:
  #   allowOrigins:
  #     - "https://app.example.com"
  #   allowMethods:
  #     - GET
  #     - POST
  #   allowHeaders:
  #     - "*"
  #   allowCredentials: false
  #   exposeHeaders: []
  #   maxAge: 300

# KubeMQ shared HTTP server (HTTP-family connectors) and CORS policy
http:
  # port: 9090
  # readTimeout: 30
  # bodyLimit: 1M
  # baseUrl: ""
  # cors:
  #   allowOrigins:
  #     - "https://app.example.com"
  #   allowMethods:
  #     - GET
  #     - POST
  #   allowHeaders:
  #     - "*"
  #   allowCredentials: false
  #   exposeHeaders: []
  #   maxAge: 300

# Connector framing note:
#   Always-on connectors (gRPC/API/REST/MCP/Agents/CE) use "disabled: false" framing.
#   Set "disabled: true" to turn them off.
#
#   Opt-in connectors (MQTT/AMQP/AMQP10/STOMP/AWS/GCP) are OFF by default server-side.
#   They use "enabled: true" framing — you must explicitly set "enabled: true" to open
#   their ports. Omitting the block or setting "enabled: false" keeps them closed.

# KubeMQ MCP (Model Context Protocol) connector — always-on by default server-side.
# Set "disabled: true" to turn this connector off.
# NOTE: MCP/Agents/CE share the REST HTTP port (9090). External exposure is controlled by
# the rest.expose / rest.nodePort settings above; keep REST enabled to expose them.
mcp:
  disabled: false
  # toolTimeoutSeconds: 300
  # trustedOrigins:
  #   - "auto"

# KubeMQ Agents (A2A) platform connector — always-on by default server-side.
# Set "disabled: true" to turn this connector off.
agents:
  disabled: false
  # agentTtlSeconds: 300
  # defaultTimeoutSeconds: 300
  # maxTimeoutSeconds: 3600
  # maxAgents: 0
  # maxSseIdleSeconds: 300
  # trustedOrigins:
  #   - "auto"
  # agentMaxResponseBytes: 10485760
  # agentTlsSkipVerify: false
  # agentMaxConcurrency: 100

# KubeMQ CloudEvents (CE) connector — always-on by default server-side.
# Set "disabled: true" to turn this connector off.
ce:
  disabled: false
  # timeoutSeconds: 60
  # subBuffSize: 100
  # maxSseIdleSeconds: 300
  # maxSseConnections: 0

# KubeMQ MQTT connector — opt-in (disabled by default server-side).
# Set "enabled: true" to open ports 1883 (mqtt), 8883 (mqtt-tls), 8083 (mqtt-ws) via a ClusterIP Service.
mqtt:
  enabled: true
  # NOTE: a custom port is honored end-to-end on K8s — the ClusterIP Service follows it.
  # port: 1883
  # tlsPort: 8883
  # wsPort: 8083
  # defaultPattern: events
  # subBuffSize: 100
  # queueAckTimeoutSeconds: 30
  # rpcTimeoutSeconds: 30
  # rpcMaxPending: 1024
  # capabilities:
  #   maxClients: 0
  #   maxPacketSizeBytes: 4194304
  #   receiveMaximum: 1024
  #   maxInflight: 8192
  #   maxSessionExpirySeconds: 3600
  #   maxMessageExpirySeconds: 86400
  #   maxQos: 2
  #   minProtocolVersion: 4

# KubeMQ AMQP 0.9.1 (RabbitMQ) connector — opt-in (disabled by default server-side).
# Set "enabled: true" to open the shared amqp Service ports 5672 (amqp), 5671 (amqp-tls).
# The shared amqp Service is kept when either amqp or amqp10 is enabled.
amqp:
  enabled: true
  # NOTE: a custom port is honored end-to-end on K8s — the ClusterIP Service follows it.
  # port: 5672
  # tlsPort: 5671
  # heartbeatSeconds: 60
  # frameMax: 131072
  # channelMax: 2047
  # maxConnections: 1000
  # maxBodySize: 104857600
  # defaultVhost: default
  # getBatchSize: 32
  # deadLetterMaxHops: 16
  # maxReceiveCount: 0

# KubeMQ AMQP 1.0 connector — opt-in (disabled by default server-side).
# Set "enabled: true" to open the shared amqp Service ports 5672 (amqp), 5671 (amqp-tls).
# The shared amqp Service is kept when either amqp or amqp10 is enabled.
amqp10:
  enabled: true
  # NOTE: a custom port is honored end-to-end on K8s — the ClusterIP Service follows it.
  # port: 5672
  # tlsPort: 5671
  # maxFrameSize: 131072
  # maxMessageSize: 104857600
  # sessionMax: 256
  # maxLinksPerSession: 256
  # maxConnections: 1000
  # idleTimeoutSeconds: 120
  # defaultPattern: queues
  # getBatchSize: 32
  # maxUnsettledPerLink: 1024
  # defaultRpcTimeoutSeconds: 30
  # rpcMaxPending: 512

# KubeMQ STOMP connector — opt-in (disabled by default server-side).
# Set "enabled: true" to open ports 61613 (stomp), 61614 (stomp-tls) via a ClusterIP Service.
stomp:
  enabled: true
  # NOTE: a custom port is honored end-to-end on K8s — the ClusterIP Service follows it.
  # port: 61613
  # tlsPort: 61614
  # defaultPattern: events
  # subBuffSize: 100
  # maxConnections: 1000
  # maxBodySize: 104857600
  # heartbeatMs: 10000
  # queueAckTimeoutSeconds: 30
  # rpcTimeoutSeconds: 30
  # rpcMaxPending: 1024

# KubeMQ AWS (SQS/SNS) connector — opt-in (disabled by default server-side).
# Set "enabled: true" to open port 4566 (aws-http) via a ClusterIP Service. AWS credentials are not set via the CR.
aws:
  enabled: true
  # NOTE: a custom port is honored end-to-end on K8s — the ClusterIP Service follows it.
  # port: 4566
  # region: kubemq
  # accountId: "000000000000"
  # advertisedUrl: ""
  # maxInflightPerQueue: 20000
  # maxConcurrentPolls: 1024
  # readTimeout: 60
  # bodyLimit: 2M

# Google Cloud Pub/Sub connector — opt-in (disabled by default server-side).
# Set "enabled: true" to open port 8085 (gcp-grpc) via a ClusterIP Service. gRPC-only.
gcp:
  enabled: true
  # port: 8085
  # advertisedEndpoint: ""
  # maxMessageBytes: 10485760
  # defaultAckDeadlineSeconds: 10
  # maxOutstandingMessages: 1000
  # maxInflightPerSubscription: 20000
  # maxConcurrentPolls: 1024
  # deliveryShards: 16
  # maxAckExtensionSeconds: 600
  # streamCloseSeconds: 1800
  # maxSeekReplay: 1000000
  # enableReflection: false

# KubeMQ Authentication Configuration - https://docs.kubemq.io/configuration/cluster/set-authentication
authentication:
  key: jwt
  type: jwt token type
  # enable: true
  # signatureType: HS256
  # oidc:
  #   issuer: "https://issuer.example.com"
  #   clientID: "kubemq"
  #   skipClientIDCheck: false
  #   skipExpiryCheck: false
  #   skipIssuerCheck: false
  #   insecureSkipSignatureCheck: false

# KubeMQ Authorization Configuration - https://docs.kubemq.io/configuration/cluster/set-authorization
authorization:
  autoReload: 300000
  policy: policy type
  url: remote url

# KubeMQ Health Configuration - https://docs.kubemq.io/configuration/cluster/set-health-probe
health:
  failureThreshold: 3
  initialDelaySeconds: 3
  periodSeconds: 4
  successThreshold: 1
  timeoutSeconds: 10

# KubeMQ Logging Configuration - https://docs.kubemq.io/configuration/cluster/set-logs
# level: 0=Trace 1=Debug 2=Info 3=Warn 4=Error 5=Fatal
log:
  level: 1

# KubeMQ NodeSelectors Configuration - https://docs.kubemq.io/configuration/cluster/set-node-selectors
nodeSelectors:
  keys:
    key: value

# KubeMQ Queue Configuration - https://docs.kubemq.io/configuration/cluster/set-queues-settings
queue:
  defaultVisibilitySeconds: 1
  defaultWaitTimeoutSeconds: 1
  maxDelaySeconds: 1
  maxExpirationSeconds: 1
  maxReQueues: 1
  maxReceiveMessagesRequest: 1
  maxVisibilitySeconds: 1
  maxWaitTimeoutSeconds: 1
  # maxInflight: 1024
  # pubAckWaitSeconds: 30

# KubeMQ Resources Configuration - https://docs.kubemq.io/configuration/cluster/set-resources-limits
resources:
  limitsCpu: "3"
  limitsEphemeralStorage: 100Gi
  limitsMemory: 2Gi
  requestsCpu: "3"
  requestsEphemeralStorage: 200Gi
  requestsMemory: 4Gi

# KubeMQ Routing Configuration - https://docs.kubemq.io/configuration/cluster/set-routing
routing:
  autoReload: 300000
  data: routing data
  url: routing url

# KubeMQ Cluster Configuration - when standalone is true, KubeMQ will run as a single node
standalone: false

# KubeMQ Store Configuration - https://docs.kubemq.io/configuration/cluster/set-store-settings
store:
  clean: true
  maxChannelSize: 0
  maxChannels: 0
  maxMessages: 0
  maxSubscribers: 0
  messagesRetentionMinutes: 0
  path: path to store
  purgeInactiveMinutes: 0
  # idlePruneCutoffHours: 24

# KubeMQ Audit Configuration
audit:
  # enable: true
  # retentionHours: 720
  # cleanupIntervalMinutes: 60

# KubeMQ Telemetry (OpenTelemetry) Configuration
telemetry:
  # enable: true
  # serviceName: kubemq
  # traces:
  #   enable: true
  #   samplingRatio: 1.0
  #   sampler: parent_based
  # metrics:
  #   enable: true
  #   exportInterval: 60s
  # exporter:
  #   protocol: grpc
  #   endpoint: "otel-collector:4317"
  #   insecure: false
  #   compression: gzip
  #   timeout: 10s

# KubeMQ TLS Configuration - https://docs.kubemq.io/configuration/cluster/set-tls
tls:
  ca: ca data
  cert: cert data
  key: key data

