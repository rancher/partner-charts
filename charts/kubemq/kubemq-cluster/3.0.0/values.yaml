key:

# Optional — source the license from an existing Kubernetes Secret instead of the literal
# key/license above, so the raw token is never stored in the KubemqCluster object or in
# Helm's saved release values. Create the Secret first, then set the ref. A ref is mutually
# exclusive with its literal. Data-key defaults: "key" / "license" (override via *SecretKey).
#   kubectl create secret generic my-kubemq-license --from-literal=key=<your-license-key>
# keySecretRef: my-kubemq-license
# keySecretKey: key
# licenseSecretRef: my-kubemq-license
# licenseSecretKey: license

# Health / liveness probe.
# Enabling this also binds the management API to 0.0.0.0 (instead of loopback),
# so the dashboard/API is reachable via the Service and `kubectl port-forward`.
# Probe timings are left to the operator defaults; override here if the server
# cold-start is slow (e.g. health.initialDelaySeconds).
health:
  enabled: true

# Image pull secrets for private registries
# Reference existing secrets created by kubectl or other methods
# Example:
#   imagePullSecrets:
#     - name: my-registry-secret
imagePullSecrets: []
