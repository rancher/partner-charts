# -- Internal settings used with `helm template` to generate install manifest
# @ignored
templating:
  enabled: false

fipsEnabled: false

postgresql:
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.1.0-debian-11-r22
    digest: ""

  # -- Deploy postgresql dependency chart
  enabled: false

  auth:
    postgresPassword: reports

    database: reportsdb

# -- Name override
nameOverride: ""

# -- Full name override
fullnameOverride: ""

# -- Number of pod replicas
replicaCount: 1

# -- Optional cluster name, used to easily identify database records when querying the database directly
clusterName: ""

image:
  # -- Image registry
  registry: reg.nirmata.io
  # -- Image repository
  repository: nirmata/reports-server
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (will default to app version if not set)
  tag: ~

# -- Image pull secrets
imagePullSecrets: []

# -- Priority class name
priorityClassName: system-cluster-critical

serviceAccount:
  # -- Create service account
  create: true

  # -- Service account annotations
  annotations: {}

  # -- Service account name (required if `serviceAccount.create` is `false`)
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Labels to add to resources managed by the chart
commonLabels: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 2000

# -- Provide additional environment variables to the pods. Map with the same format as kubernetes deployment spec's env.
podEnv: {}

# -- Container security context
# @default -- See [values.yaml](values.yaml)
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  privileged: false
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault

# -- Liveness probe
livenessProbe:
  initialDelaySeconds: 20
  failureThreshold: 10
  periodSeconds: 10
  httpGet:
    path: /livez
    port: https
    scheme: HTTPS

# -- Readiness probe
readinessProbe:
  initialDelaySeconds: 30
  failureThreshold: 10
  periodSeconds: 10
  httpGet:
    path: /readyz
    port: https
    scheme: HTTPS

compliance:
  # -- Enable all compliance monitoring features at once
  # When enabled, this automatically enables:
  # - metrics.serviceMonitor.enabled
  # - metrics.prometheusRules.enabled
  # - metrics.grafanaDashboard.enabled
  enabled: false

metrics:
  # -- Enable prometheus metrics
  enabled: true

  serviceMonitor:
    # -- Enable service monitor for scraping prometheus metrics
    enabled: false

    # -- Service monitor additional labels
    additionalLabels: {}

    # -- Service monitor scrape interval
    interval: ""

    # -- Service monitor metric relabelings
    metricRelabelings: []

    # -- Service monitor relabelings
    relabelings: []

    # -- Service monitor scrape timeout
    scrapeTimeout: ""

  prometheusRules:
    # -- Enable prometheus recording rules for policy compliance metrics
    enabled: false

    # -- PrometheusRule additional labels
    additionalLabels: {}

  grafanaDashboard:
    # -- Enable Grafana dashboard ConfigMap creation
    enabled: false

    # -- Namespace to create the ConfigMap in (defaults to release namespace)
    namespace: ""

    # -- Labels to add to the ConfigMap (for Grafana sidecar discovery)
    # @default -- See values.yaml
    labels:
      grafana_dashboard: "1"

    # -- Annotations to add to the ConfigMap
    annotations: {}

# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
resources:
  # -- Container resource limits
  limits:
  # cpu: 100m
  # memory: 128Mi

  # -- Container resource requests
  requests:
  # cpu: 100m
  # memory: 128Mi

autoscaling:
  # -- Enable autoscaling
  enabled: false

  # -- Min number of replicas
  minReplicas: 1

  # -- Max number of replicas
  maxReplicas: 100

  # -- Target CPU utilisation percentage
  targetCPUUtilizationPercentage: 80

  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: ~

  # -- Configures custom HPA metrics
  # Ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
  metrics: []

  # -- Configures the scaling behavior of the target in both Up and Down directions.
  behavior: {}
  # scaleDown:
  #  stabilizationWindowSeconds: 300
  #  policies:
  #    - type: Pods
  #      value: 1
  #      periodSeconds: 180
  # scaleUp:
  #   stabilizationWindowSeconds: 300
  #   policies:
  #     - type: Pods
  #       value: 2
  #       periodSeconds: 60

# -- Using a PDB is highly recommended for highly available deployments. Defaults to enabled. The default configuration doesn't prevent disruption when using a single replica
pdb:
  # -- Enable PodDisruptionBudget
  enabled: true
  # -- minAvailable pods for PDB, cannot be used together with maxUnavailable
  minAvailable: ~
  # -- maxUnavailable pods for PDB, will take precedence over minAvailable if both are defined
  maxUnavailable: 50%

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity
affinity: {}

service:
  # -- Service type
  type: ClusterIP

  # -- Service port
  port: 443

config:
  # -- Skip database migration on startup
  skipMigration: false

  etcd:
    image:
      # -- Image registry
      registry: ghcr.io
      # -- Image repository
      repository: nirmata/etcd
      # -- Image tag
      tag: 3.6.9-hardened

    # -- Image pull secrets for the etcd container image
    imagePullSecrets: []

    enabled: true
    endpoints: ~
    insecure: true

    # PVC storage size for etcd persistence (e.g., "2Gi", "5Gi"). This sizes
    # the persistent volume claim, not the etcd DB quota.
    # NOTE: keep this 10-20% greater than `quotaBackendBytes` so etcd has
    # filesystem headroom above its logical DB quota.
    storage: 2Gi

    # Quota for etcd's internal database (BoltDB) in bytes. Limits the logical
    # size of the etcd DB file, not the PVC. Format: plain integer bytes
    # (no Ki/Mi/Gi suffix). Default ~1.8GiB pairs with the 2Gi PVC default.
    quotaBackendBytes: 1932735283

    # -- Storage class name for etcd PVC.
    # Leave empty to use the cluster's default storage class. Set to a specific
    # storage class name (e.g., "fast", "standard", "aws-ebs") to pin the PV.
    storageClassName: ""

    ## Node labels for etcd pod assignment.
    ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
    nodeSelector: {}

    ## Tolerations for etcd pod assignment.
    ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
    tolerations: []

    # Auto-compaction configuration for etcd. Compaction reclaims storage taken
    # by historical revisions; without it, the etcd DB grows unboundedly under
    # write load.
    autoCompaction:
      # -- Enable auto-compaction for etcd
      enabled: true
      # -- Auto-compaction mode (periodic or revision)
      mode: periodic
      # -- Auto-compaction retention (e.g., 30m for 30 minutes, 1h for 1 hour)
      retention: 30m

  db:

    # -- If set, a secret will be created with the database connection information. If this is set to true, secretName must be set.
    secretCreation: false

    # -- If set, database connection information will be read from the Secret with this name. Overrides `db.host`, `db.name`, `db.user`, `db.password`, and `db.readReplicaHosts`.
    secretName: ""

    # -- Database host
    host: ""
    # -- The database host will be read from this `key` in the specified Secret, when `db.secretName` is set.
    hostSecretKeyName: "host"

    # -- Database read replica hosts. Comma-separated list of hostnames; reads are routed to a random replica with fallback to the primary.
    readReplicaHosts: ""
    # -- The database read replica hosts will be read from this `key` in the specified Secret, when `db.secretName` is set.
    readReplicaHostsSecretKeyName: "readReplicaHosts"

    # -- Database port
    port: 5432
    # -- The database port will be read from this `key` in the specified Secret, when `db.secretName` is set.
    portSecretKeyName: "port"

    # -- Database name
    name: reportsdb
    # -- The database name will be read from this `key` in the specified Secret, when `db.secretName` is set.
    dbNameSecretKeyName: "dbname"

    # -- Database user
    user: postgres

    # -- The database username will be read from this `key` in the specified Secret, when `db.secretName` is set.
    userSecretKeyName: "username"

    # -- Database password
    password: reports

    # -- The database password will be read from this `key` in the specified Secret, when `db.secretName` is set.
    passwordSecretKeyName: "password"

    # -- Database SSL
    sslmode: disable

    # -- Database SSL root cert
    sslrootcert: ""

    # -- Database SSL key
    sslkey: ""

    # -- Database SSL cert
    sslcert: ""

    # -- Volume configuration for an RDS (or other managed Postgres) CA bundle.
    # When `secretName` is set, the chart mounts the named Secret at `mountPath`
    # inside the reports-server pod. Pair with `sslrootcert` pointing at a file
    # under that mountPath to enable TLS verification.
    sslrds:
      secretName: ""
      mountPath: "/etc/ssl/rds"

    # -- Database connection pool configuration (per reports-server pod).
    # These control how many concurrent PostgreSQL connections each pod opens.
    # Defaults match the storage layer's built-in defaults.
    connectionPool:
      # -- Maximum number of open connections per pod (sql.DB.SetMaxOpenConns)
      maxOpenConns: 25
      # -- Maximum number of idle connections per pod (sql.DB.SetMaxIdleConns)
      maxIdleConns: 5
      # -- Maximum lifetime of a connection in seconds (0 = use storage default of 300s / 5m)
      connMaxLifetimeSeconds: 300
      # -- Maximum idle time of a connection in seconds (0 = use storage default of 120s / 2m)
      connMaxIdleTimeSeconds: 120

apiServicesManagement:
  # -- Manage APIService objects for the reports-server. APIServices are anchored
  # to the chart's ClusterRole via OwnerReferences and garbage-collected on uninstall.
  enabled: true

  # -- Install api services in manifest
  installApiServices:
    # -- Store reports in reports-server
    enabled: true

    # -- Store ephemeral reports in reports-server
    installEphemeralReportsService: true

    # -- Store open reports in reports-server
    installOpenreportsService: true

  image:
    # -- (string) Image registry
    registry: ghcr.io
    # -- Image repository
    repository: nirmata/kubectl
    # -- Image tag
    # Defaults to `latest` if omitted
    tag: '1.35-alpine3.23-dev'
    # -- (string) Image pull policy
    # Defaults to image.pullPolicy if omitted
    pullPolicy: IfNotPresent

  # -- Image pull secrets
  imagePullSecrets: []

  # -- Security context for the pod
  podSecurityContext: {}

  # -- Node labels for pod assignment
  nodeSelector: {}

  # -- List of node taints to tolerate
  tolerations: []

  # -- Pod anti affinity constraints.
  podAntiAffinity: {}

  # -- Pod affinity constraints.
  podAffinity: {}

  # -- Pod labels.
  podLabels: {}

  # -- Pod annotations.
  podAnnotations: {}

  # -- Node affinity constraints.
  nodeAffinity: {}

  # -- Security context for the hook containers
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    runAsNonRoot: true
    privileged: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

extraObjects: []

openreports:
  # -- Deploy openreports-api CRDs
  enabled: false
