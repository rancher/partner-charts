apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  labels:
    operator: dxoperator-v2
  name: dxoperator-v2-mutators
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: 
    service:
      name: dxoperator-v2-operator
      namespace: dxoperator-v2-system
      path: /mutate/sqlagentity
  matchPolicy: Exact
  name: mutate.dxsqlag.dh2i.com.v1
  rules:
  - apiGroups:
    - dh2i.com
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - dxsqlags
  sideEffects: None
