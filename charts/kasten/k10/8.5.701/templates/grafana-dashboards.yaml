{{- if .Values.grafana.dashboards.enabled }}
{{- range $path, $bytes := .Files.Glob "grafana/dashboards/support/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "grafana-dashboard-k10-support-%s" (base $path | trimSuffix ".json") }}
  namespace: {{ $.Release.Namespace }}
  labels:
{{ include "helm.labels" $ | indent 4 }}
    grafana_dashboard: "1"
  annotations:
    {{ $.Values.grafana.dashboards.folderAnnotation }}: "Veeam Kasten Support"
data:
  {{ base $path }}: |
    {{- $bytes | toString | nindent 4 }}
{{- end }}
{{- end }}
