kind: ConfigMap
apiVersion: v1
metadata:
  labels:
{{ include "helm.labels" . | indent 4 }}
  namespace: {{ .Release.Namespace }}
  name: frontend-config
data:
  frontend.conf: |
    server {
        listen {{ .Values.service.externalPort }} default_server;
    {{- if .Values.global.network.enable_ipv6 }}
        listen [::]:{{ .Values.service.externalPort }} default_server;
    {{- end }}
        server_name localhost;

        gzip on;
        # serves *.gz files (when present) instead of dynamic compression
        gzip_static on;

        root /frontend;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
  nginx.conf: |
    #user nginx; # this directive is ignored if we use a non-root user in Dockerfile
    worker_processes 4;

    error_log stderr warn;
    pid /var/lib/nginx/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        access_log /dev/stdout;
        sendfile on;
        keepalive_timeout 650;
        client_body_temp_path /var/lib/nginx/client_body;
        proxy_temp_path /var/lib/nginx/proxy;
        fastcgi_temp_path /var/lib/nginx/fastcgi;
        uwsgi_temp_path /var/lib/nginx/uwsgi;
        scgi_temp_path /var/lib/nginx/scgi;

        # turn off nginx version in responses
        server_tokens off;

        include /etc/nginx/conf.d/*.conf;
    }
