{{ include "check.validatePrometheusConfig" .}}
{{- if .Values.prometheus.server.enabled -}}
{{- $cluster_domain := "" -}}
{{- with .Values.cluster.domainName -}}
  {{- $cluster_domain = printf ".%s" . -}}
{{- end -}}
{{- $rbac := .Values.prometheus.rbac.create -}}
{{- $clusterName := include "k10.acm.clusterName" . -}}
{{- /* Require clusterName when remote_write is enabled */ -}}
{{- if .Values.prometheus.server.remote_write -}}
  {{- if not $clusterName -}}
    {{- fail "clusterName is required when prometheus.server.remote_write is configured. When ACM is enabled, auto-detection of the cluster name was attempted and either failed or is not supported on this platform. Please either set .Values.clusterName explicitly or enable ACM with proper OpenShift infrastructure so that the cluster name can be auto-detected." -}}
  {{- end -}}
{{- end -}}
{{- /* Validate ACM configuration */ -}}
{{- include "k10.acm.validate" . -}}
{{- /* Resolve cluster UID. Precedence: explicit override, ACM cluster ID, default-namespace UID. */ -}}
{{- $clusterUID := "" -}}
{{- if .Values.prometheus.server.clusterUIDOverride -}}
  {{- $clusterUID = .Values.prometheus.server.clusterUIDOverride -}}
{{- else if .Values.global.acm.enabled -}}
  {{- $clusterUID = include "k10.acm.openshiftClusterID" . -}}
{{- else -}}
  {{- $defaultNS := (lookup "v1" "Namespace" "" "default") -}}
  {{- if $defaultNS -}}
    {{- $clusterUID = $defaultNS.metadata.uid -}}
  {{- end -}}
{{- end -}}
kind: ConfigMap
apiVersion: v1
metadata:
  labels:
{{ include "helm.labels" . | indent 4 }}
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-{{ .Values.prometheus.server.configMapOverrideName }}
data:
  alerting_rules.yml: |
    groups:
      - name: k10-prometheus-health
        rules:
          - alert: K10PrometheusTSDBUtilizationHigh
            expr: |
              (
                prometheus_tsdb_storage_blocks_bytes
                / clamp_min(prometheus_tsdb_retention_limit_bytes, 1)
              ) > 0.85
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: K10 Prometheus TSDB utilization above 85% of retentionSize limit
              description: >-
                TSDB block storage is at {{ "{{ $value | humanizePercentage }}" }} of the configured retentionSize limit.
                Size-based retention will start dropping old data soon.
                Consider increasing prometheus.server.persistentVolume.size.
          - alert: K10PrometheusSizeRetentionActive
            expr: increase(prometheus_tsdb_size_retentions_total[1h]) > 0
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: Prometheus is actively dropping data due to retentionSize limit
              description: >-
                Size-based retention events detected in the last hour.
                The retention time window may be shorter than configured.
                Consider increasing prometheus.server.persistentVolume.size.
  prometheus.yml: |
    global:
      scrape_interval: {{ (default "1m" .Values.prometheus.server.global.scrape_interval) | quote }}
      scrape_timeout: {{ (default "10s" .Values.prometheus.server.global.scrape_timeout) | quote }}
      evaluation_interval: {{ (default "1m" .Values.prometheus.server.global.evaluation_interval) | quote }}
{{- if or $clusterName $clusterUID .Values.prometheus.server.global.external_labels }}
      external_labels:
{{- if $clusterUID }}
        cluster_uid: {{ $clusterUID }}
{{- end }}
{{- if $clusterName }}
        cluster_name: {{ $clusterName }}
{{- end }}
{{- if .Values.prometheus.server.global.external_labels }}
{{- toYaml .Values.prometheus.server.global.external_labels | nindent 8 }}
{{- end }}
{{- end }}
{{- $remoteWritesJson := include "k10.acm.mergeRemoteWrites" (dict "root" . "remoteWrites" (.Values.prometheus.server.remote_write | default list)) }}
{{- $remoteWrites := mustFromJson $remoteWritesJson }}
{{- if $remoteWrites }}
    remote_write:
{{- toYaml $remoteWrites | nindent 6 }}
{{- end }}
    rule_files:
      - /etc/config/alerting_rules.yml
    scrape_configs:
      - job_name: httpServiceDiscovery
        http_sd_configs:
          - url: {{ printf "http://metering-svc.%s.svc%s:8000/v0/listScrapeTargets" .Release.Namespace $cluster_domain }}
{{- if or .Values.workerPodMetricSidecar.enabled .Values.kanisterPodMetricSidecar.enabled }}
      - job_name: pushAggregator
        honor_timestamps: true
        metrics_path: /v0/push-metric-agg/metrics
        static_configs:
          - targets:
              - {{ printf "metering-svc.%s.svc%s:8000" .Release.Namespace $cluster_domain }}
{{- end -}}
{{- if .Values.prometheus.scrapeCAdvisor }}
      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
{{- end}}
      - job_name: prometheus
        metrics_path: {{ .Values.prometheus.server.baseURL }}metrics
        static_configs:
          - targets:
              - "localhost:9090"
            labels:
              app: prometheus
              component: server
      - job_name: k10-pods
        scheme: http
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              own_namespace: true
            selectors:
              - role: pod
                label: "component=executor"
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: 8\d{3}
{{- end -}}
