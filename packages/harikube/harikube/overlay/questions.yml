questions:
- variable: middleware.monitoring.create
  default: false
  description: Enable creation of middleware monitoring resources.
  label: Middleware Monitoring Create
  type: boolean
  group: "Metrics and Monitoring"

- variable: middleware.resources.limits.memory
  default: 4Gi
  description: Memory limit for the middleware component.
  label: Middleware Resources Limits Memory
  type: string
  group: "Resource Settings"

- variable: middleware.resources.requests.cpu
  default: 1000m
  description: CPU request for the middleware component.
  label: Middleware Resources Requests CPU
  type: string
  group: "Resource Settings"

- variable: middleware.pvc.resources.requests.storage
  default: 5Gi
  description: Storage request for the middleware persistent volume claim.
  label: Middleware PVC Resources Requests Storage
  type: string
  group: "Instance Settings"

- variable: middleware.pvc.storageClassName
  default: standard
  description: StorageClass name to use for the middleware PVC.
  label: Middleware PVC StorageClassName
  type: string
  group: "Instance Settings"

- variable: middleware.endPoint.url
  default: sqlite:///db/main.db?_journal=WAL&cache=shared
  description: Database endpoint URL used by the middleware.
  label: Middleware main database endpoint
  type: string
  group: "Database Settings"

- variable: endpointTLS
  default: false
  description: Enable TLS when connecting to the middleware database endpoint.
  label: Middleware main database endpoint TLS
  type: boolean
  group: "Database Settings"
  show_subquestion_if: true
  subquestions:
  - variable: middleware.endPoint.caPEM
    default: ""
    description: CA certificate PEM for verifying the database endpoint.
    label: Middleware main database endpoint CA PEM
    type: string
  - variable: middleware.endPoint.certPEM
    default: ""
    description: Client certificate PEM for TLS authentication.
    label: Middleware main database endpoint cert PEM
    type: string
  - variable: middleware.endPoint.keyPEM
    default: ""
    description: Client private key PEM for TLS authentication.
    label: Middleware main database endpoint key PEM
    type: string
  - variable: middleware.endPoint.skipVerify
    default: false
    description: Skip certificate verification for the database endpoint.
    label: Middleware main database endpoint skip verify
    type: boolean

- variable: apiServer.create
  default: false
  description: Enable creation of the API server resources.
  label: API Server Create
  type: boolean
  group: "API Settings"
  show_subquestion_if: true
  subquestions:
  - variable: apiServer.replicas
    default: 1
    description: Number of API server replicas to run.
    label: API Server Replicas
    type: integer
  - variable: apiServer.resources.limits.memory
    default: 4Gi
    description: Memory limit for the API server component.
    label: API Server Resources Limits Memory
    type: string
  - variable: apiServer.resources.requests.cpu
    default: 200m
    description: CPU request for the API server component.
    label: API Server Resources Requests CPU
    type: string
  - variable: apiServer.monitoring.create
    default: false
    description: Enable creation of API server monitoring resources.
    label: API Server Monitoring Create
    type: boolean
