- variable: api.csaf.existingCsafSecretName
  required: false
  type: string
  default: "csaf-key-pair"
  label: CSAF Secret Name
  group: "CSAF (optional, for advisory generation)"
  description: |-
    For Common Security Advisory Framework (CSAF) advisory generation, create a PGP key pair and store it in a Kubernetes secret.

    Generate the key pair:
      gpg --full-generate-key
      KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
      gpg --armor --export "$KEY_ID" > public.asc
      gpg --armor --export-secret-keys "$KEY_ID" > private.asc
      FINGERPRINT=$(gpg --fingerprint "$KEY_ID" | grep -A1 "pub " | tail -1 | tr -d ' ')

    Create the secret:
      kubectl create secret generic csaf-key-pair \
        --from-file=privateKey=private.asc \
        --from-file=publicKey=public.asc \
        --from-literal=passphrase="your-passphrase" \
        --from-literal=fingerprint="$FINGERPRINT" \
        -n devguard

    The name of the existing secret containing the CSAF PGP key pair. Leave empty to disable CSAF features.
- variable: api.csaf.aggregatorNamespace
  required: false
  type: string
  label: CSAF Aggregator Namespace
  description: The namespace (domain) of the CSAF aggregator (e.g. example.com).
  group: "CSAF (optional, for advisory generation)"
- variable: api.csaf.aggregatorName
  required: false
  type: string
  label: CSAF Aggregator Name
  description: The name of the CSAF aggregator organization (e.g. Example GmbH).
  group: "CSAF (optional, for advisory generation)"
- variable: api.csaf.aggregatorContactDetails
  required: false
  type: string
  label: CSAF Aggregator Contact Details
  description: The contact details for the CSAF aggregator (e.g. csaf@example.com).
  group: "CSAF (optional, for advisory generation)"
