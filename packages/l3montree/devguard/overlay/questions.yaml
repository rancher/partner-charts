questions:
- variable: api.ingress.enabled
  default: true
  required: true
  type: boolean
  label: API Ingress Enabled
  group: "API (required for web and API access)"
  show_subquestion_if: true
  subquestions:
  - variable: api.ingress.hosts[0].host
    required: true
    type: hostname
    label: API Ingress Host
    description: The hostname for the API ingress. This should be a fully qualified domain name (FQDN) that resolves to the IP address of the ingress controller (e.g. api.devguard.example.com).
    group: "API (required for web and API access)"
  - variable: api.ingress.hosts[0].paths[0].path
    required: true
    default: "/"
    type: string
    label: API Ingress Path
    description: The path for the API ingress. This should be a valid URL path (e.g. / or /devguard/).
    group: "API (required for web and API access)"


- variable: web.ingress.enabled
