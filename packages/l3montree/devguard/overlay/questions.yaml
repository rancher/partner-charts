    description: The hostname for the web ingress. This should be a fully qualified domain name (FQDN) that resolves to the IP address of the ingress controller (e.g. web.devguard.example.com).
    group: "Web (required for web access)"
  - variable: web.ingress.hosts[0].paths[0].path
    required: true
